name: Build Windows Installer

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # --- 修改点 1: 更稳健的 Qt 安装步骤 ---
    - name: Setup Qt (via aqtinstall)
      run: |
        # 1. 安装/升级 aqtinstall
        python -m pip install --upgrade pip
        pip install aqtinstall
        
        # 2. 设置清华镜像源环境变量
        $env:AQT_BASE_URL = "https://mirrors.tuna.tsinghua.edu.cn/qt"
        
        # 3. 安装 Qt 6.8.1 (MSVC 2022 64位)
        # 【关键修改】：移除了 --modules qtstatemachine 参数
        python -m aqt install-qt windows desktop 6.8.1 win64_msvc2022_64 --base https://mirrors.tuna.tsinghua.edu.cn/qt
        
        # 4. 设置环境变量
        $QtDir = "C:\Qt\6.8.1\msvc2022_64"
        echo "$QtDir\bin" >> $env:GITHUB_PATH
        echo "CMAKE_PREFIX_PATH=$QtDir" >> $env:GITHUB_ENV
        
        # 5. 验证安装
        if (!(Test-Path "$QtDir\bin\qmake.exe")) {
            Write-Error "Qt installation failed or path incorrect!"
            exit 1
        }
      shell: pwsh

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    # --- 修改点 2: 简化 CMake 配置，移除容易失败的 fallback 逻辑 ---
    - name: Configure CMake
      run: |
        # 创建构建目录
        cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release
        
        # 如果上面报错，说明缺少 openconnect 库。
        # 我们在下一步统一用 vcpkg 解决依赖，这里先允许失败以便触发下一步
      continue-on-error: true

    # --- 修改点 3: 统一的依赖安装与重新配置 ---
    - name: Install Dependencies & Reconfigure via Vcpkg
      run: |
        # 1. 克隆并 bootstrap vcpkg
        git clone https://github.com/microsoft/vcpkg.git
        cd vcpkg
        .\bootstrap-vcpkg.bat -disableMetrics
        
        # 2. 安装 openconnect 和 stoken (这是 OpenConnect GUI 的核心依赖)
        .\vcpkg.exe install openconnect:x64-windows stoken:x64-windows zlib:x64-windows
        
        # 3. 集成到系统
        .\vcpkg.exe integrate install
        
        # 4. 返回根目录，使用 vcpkg 工具链重新配置 CMake
        cd ..
        cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_TOOLCHAIN_FILE="vcpkg/scripts/buildsystems/vcpkg.cmake" `
          -DCMAKE_PREFIX_PATH="C:\Qt\6.8.1\msvc2022_64"

    - name: Build Project
      run: |
        cmake --build build --config Release --parallel

    - name: Deploy Qt Libraries
      run: |
        # 创建发布目录
        New-Item -ItemType Directory -Force -Path deploy
        
        # 复制主程序
        Copy-Item "build\Release\openconnect-gui.exe" "deploy\"
        
        # 部署 Qt 基础 DLLs
        windeployqt "deploy\openconnect-gui.exe" --release --no-compiler-runtime --no-system-d3d-compiler --no-opengl-sw
        
        # 复制 vcpkg 安装的第三方库 (openconnect, stoken 等)
        # 暴力复制所有 bin 下的 dll 到 deploy 目录 (生产环境可优化为只复制需要的)
        Copy-Item "vcpkg\installed\x64-windows\bin\*.dll" "deploy\" -Force
        
        # 列出文件以便检查
        Get-ChildItem deploy

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenConnect-GUI-CN-Windows
        path: deploy/
        retention-days: 14
