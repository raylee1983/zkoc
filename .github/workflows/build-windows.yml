name: Build Windows Installer (Stable LTS)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    # 1. 获取源码
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # 2. 安装 Qt (使用稳定的 6.5.3 LTS 版本)
    - name: Setup Qt (via aqtinstall)
      run: |
        python -m pip install --upgrade pip
        pip install aqtinstall
        
        $MIRROR = "https://mirrors.aliyun.com/qt"
        Write-Host "Installing Qt 6.5.3 + StateMachine..."
        
        # 【关键】尝试重新安装 qtstatemachine 模块
        # 如果阿里云源正常，这次应该能成功
        python -m aqt install-qt windows desktop 6.5.3 win64_msvc2019_64 --modules qtstatemachine --base $MIRROR
        
        $BaseDir = Get-Location
        $QtDir = Join-Path $BaseDir "6.5.3\msvc2019_64"
        
        if (!(Test-Path "$QtDir\bin\qmake.exe")) {
            Write-Error "Qt installation failed!"
            Get-ChildItem $BaseDir
            exit 1
        }
        
        # 验证 StateMachine 是否安装
        if (!(Test-Path "$QtDir\lib\cmake\Qt6StateMachine")) {
            Write-Warning "QtStateMachine module not found! Build might fail."
            # 如果确实没找到，我们继续，看 CMake 能否处理，或者稍后在 CMake 参数中忽略
        } else {
            Write-Host "QtStateMachine found."
        }

        echo "$QtDir\bin" >> $env:GITHUB_PATH
        echo "CMAKE_PREFIX_PATH=$QtDir" >> $env:GITHUB_ENV
      shell: pwsh

    # 3. 配置 MSVC 编译器 (使用 v142 工具集匹配 Qt 6.5.3)
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    # 4. 安装依赖 (OpenConnect, Stoken) 并配置 CMake
    - name: Install Dependencies & Configure CMake
      run: |
        # --- 1. 设置 vcpkg ---
        Write-Host "Setting up vcpkg..."
        if (!(Test-Path "vcpkg")) {
            git clone https://github.com/microsoft/vcpkg.git
        }
        cd vcpkg
        .\bootstrap-vcpkg.bat -disableMetrics
        .\vcpkg.exe update # 强制更新 ports 树
        
        # --- 2. 安装依赖 ---
        Write-Host "Installing openconnect, stoken..."
        # 尝试安装 openconnect。如果报错不存在，尝试搜索正确包名
        # 注意：vcpkg 包名通常是全小写
        if (!(.\vcpkg.exe search openconnect | Select-String "openconnect")) {
            Write-Error "Package openconnect not found in vcpkg. Trying alternative..."
            # 如果真的没有，可能需要手动编译或寻找替代源。
            # 但通常是因为 search 需要联网更新，上面 update 过了应该有。
            # 这里我们强制安装，如果失败再报错
        }
        
        .\vcpkg.exe install openconnect:x64-windows stoken:x64-windows zlib:x64-windows openssl:x64-windows --recurse
        
        cd ..
        
        # --- 3. 配置 CMake ---
        $BaseDir = Get-Location
        $QtDir = Join-Path $BaseDir "6.5.3\msvc2019_64"
        
        Write-Host "Configuring CMake..."
        
        # 添加参数：如果 StateMachine 真的找不到，尝试让 CMake 继续 (如果项目允许)
        # 但最好还是指望上面安装成功了。
        cmake -S . -B build `
          -G "Visual Studio 17 2022" `
          -A x64 `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_TOOLCHAIN_FILE="vcpkg/scripts/buildsystems/vcpkg.cmake" `
          -DCMAKE_PREFIX_PATH="$QtDir" `
          -DQT_DEBUG_FIND_PACKAGE=OFF # 关闭调试输出，保持日志干净
          
      shell: pwsh

    # 5. 编译项目
    - name: Build Project
      run: |
        cmake --build build --config Release --parallel
      shell: pwsh

    # 6. 部署运行环境 (复制 DLLs)
    - name: Deploy Runtime
      run: |
        # 创建发布目录
        New-Item -ItemType Directory -Force -Path deploy
        
        # 复制主程序
        Copy-Item "build\Release\openconnect-gui.exe" "deploy\"
        
        # 部署 Qt 基础库 (自动复制 qtcore, qtgui, qtwidgets 等)
        Write-Host "Deploying Qt libraries..."
        windeployqt "deploy\openconnect-gui.exe" --release --no-compiler-runtime --no-system-d3d-compiler --no-opengl-sw
        
        # 复制 vcpkg 安装的第三方库 (openconnect.dll, stoken.dll 等)
        Write-Host "Copying vcpkg dependencies..."
        Copy-Item "vcpkg\installed\x64-windows\bin\*.dll" "deploy\" -Force
        
        # 清理不必要的文件 (可选，减小体积)
        # Remove-Item "deploy\*.pdb" -ErrorAction SilentlyContinue
        
        Write-Host "Deployment complete. Files in deploy:"
        Get-ChildItem deploy
      shell: pwsh

    # 7. 上传构建产物
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenConnect-GUI-CN-Windows-x64
        path: deploy/
        retention-days: 30
