name: Build Windows Installer (Stable LTS)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    # 1. 获取源码
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # 2. 安装 Qt (使用稳定的 6.5.3 LTS 版本)
    - name: Setup Qt (via aqtinstall)
      run: |
        python -m pip install --upgrade pip
        pip install aqtinstall
        
        $MIRROR = "https://mirrors.aliyun.com/qt"
        Write-Host "Installing Qt 6.5.3 (Base Only - StateMachine is included in base)..."
        
        # 【关键修改】移除 --modules qtstatemachine
        # Qt 6.x 中 StateMachine 已合并入 base 或不再作为独立模块分发
        python -m aqt install-qt windows desktop 6.5.3 win64_msvc2019_64 --base $MIRROR
        
        $BaseDir = Get-Location
        $QtDir = Join-Path $BaseDir "6.5.3\msvc2019_64"
        
        if (!(Test-Path "$QtDir\bin\qmake.exe")) {
            Write-Error "Qt installation failed!"
            exit 1
        }
        Write-Host "Qt installed successfully."
        
        echo "$QtDir\bin" >> $env:GITHUB_PATH
        echo "CMAKE_PREFIX_PATH=$QtDir" >> $env:GITHUB_ENV
      shell: pwsh

    # --- 2. 安装依赖并配置 CMake (处理 StateMachine 缺失问题) ---
    - name: Install Dependencies & Configure CMake
      run: |
        # --- 设置 vcpkg ---
        Write-Host "Setting up vcpkg..."
        if (!(Test-Path "vcpkg")) {
            git clone --depth 1 https://github.com/microsoft/vcpkg.git
        }
        cd vcpkg
        .\bootstrap-vcpkg.bat -disableMetrics
        .\vcpkg.exe update
        
        # --- 安装 openconnect 依赖 ---
        Write-Host "Installing openconnect, stoken..."
        # 尝试安装，如果 openconnect 真的不存在，这里会报错，我们再想备选方案
        # 注意：某些时候 vcpkg 需要联网更新 ports，上面 update 已执行
        .\vcpkg.exe install openconnect:x64-windows stoken:x64-windows zlib:x64-windows openssl:x64-windows --recurse
        
        cd ..
        
        # --- 配置 CMake ---
        $BaseDir = Get-Location
        $QtDir = Join-Path $BaseDir "6.5.3\msvc2019_64"
        
        Write-Host "Configuring CMake..."
        
        # 【关键策略】
        # 1. 正常配置。
        # 2. 如果报错找不到 StateMachine，说明 OpenConnect GUI 的 CMakeLists.txt 强依赖该组件。
        #    由于 Qt6 中该组件可能只是名字变了或合并了，我们可以尝试手动创建一个假的 Config 文件，
        #    或者更简单的：修改项目的 CMakeLists.txt 让它不查找这个组件（如果功能在 base 里）。
        # 
        # 这里我们先尝试直接配置，看看具体报错。
        # 如果报错 "Could NOT find Qt6StateMachine"，我们需要在源码层面修复。
        
        $CMakeArgs = @(
          "-S", ".", "-B", "build",
          "-G", "Visual Studio 17 2022",
          "-A", "x64",
          "-DCMAKE_BUILD_TYPE=Release",
          "-DCMAKE_TOOLCHAIN_FILE=vcpkg/scripts/buildsystems/vcpkg.cmake",
          "-DCMAKE_PREFIX_PATH=$QtDir"
        )
        
        # 执行配置
        cmake @CMakeArgs
        
      shell: pwsh

    # 3. 配置 MSVC 编译器 (使用 v142 工具集匹配 Qt 6.5.3)
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    # 4. 安装依赖 (OpenConnect, Stoken) 并配置 CMake
    - name: Install Dependencies & Configure CMake
      run: |
        # --- 1. 设置 vcpkg ---
        Write-Host "Setting up vcpkg..."
        if (!(Test-Path "vcpkg")) {
            git clone https://github.com/microsoft/vcpkg.git
        }
        cd vcpkg
        .\bootstrap-vcpkg.bat -disableMetrics
        .\vcpkg.exe update # 强制更新 ports 树
        
        # --- 2. 安装依赖 ---
        Write-Host "Installing openconnect, stoken..."
        # 尝试安装 openconnect。如果报错不存在，尝试搜索正确包名
        # 注意：vcpkg 包名通常是全小写
        if (!(.\vcpkg.exe search openconnect | Select-String "openconnect")) {
            Write-Error "Package openconnect not found in vcpkg. Trying alternative..."
            # 如果真的没有，可能需要手动编译或寻找替代源。
            # 但通常是因为 search 需要联网更新，上面 update 过了应该有。
            # 这里我们强制安装，如果失败再报错
        }
        
        .\vcpkg.exe install openconnect:x64-windows stoken:x64-windows zlib:x64-windows openssl:x64-windows --recurse
        
        cd ..
        
        # --- 3. 配置 CMake ---
        # --- 【新增】修复 CMakeLists.txt 以兼容 Qt 6.5.3 ---
        Write-Host "Patching CMakeLists.txt for Qt 6 compatibility..."
        
        $CMakeFile = "CMakeLists.txt"
        $Content = Get-Content $CMakeFile -Raw
        
        # 策略 A: 如果代码里有 find_package(Qt6 ... StateMachine)，尝试移除 StateMachine
        # 这是一个正则替换，移除 find_package 中的 StateMachine 组件
        $Content = $Content -replace '(find_package\s*\(\s*Qt6\s+[^)]*)\s+StateMachine', '$1'
        
        # 策略 B: 如果代码里有 find_component(StateMachine)，也尝试注释或移除
        # (根据实际报错调整，这里先试策略 A)
        
        Set-Content $CMakeFile $Content
        Write-Host "CMakeLists.txt patched."
        
        # --- 继续配置 CMake ---
        $BaseDir = Get-Location
        $QtDir = Join-Path $BaseDir "6.5.3\msvc2019_64"
        
        cmake -S . -B build `
          -G "Visual Studio 17 2022" `
          -A x64 `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_TOOLCHAIN_FILE="vcpkg/scripts/buildsystems/vcpkg.cmake" `
          -DCMAKE_PREFIX_PATH="$QtDir"
          
      shell: pwsh

    # 6. 部署运行环境 (复制 DLLs)
    - name: Deploy Runtime
      run: |
        # 创建发布目录
        New-Item -ItemType Directory -Force -Path deploy
        
        # 复制主程序
        Copy-Item "build\Release\openconnect-gui.exe" "deploy\"
        
        # 部署 Qt 基础库 (自动复制 qtcore, qtgui, qtwidgets 等)
        Write-Host "Deploying Qt libraries..."
        windeployqt "deploy\openconnect-gui.exe" --release --no-compiler-runtime --no-system-d3d-compiler --no-opengl-sw
        
        # 复制 vcpkg 安装的第三方库 (openconnect.dll, stoken.dll 等)
        Write-Host "Copying vcpkg dependencies..."
        Copy-Item "vcpkg\installed\x64-windows\bin\*.dll" "deploy\" -Force
        
        # 清理不必要的文件 (可选，减小体积)
        # Remove-Item "deploy\*.pdb" -ErrorAction SilentlyContinue
        
        Write-Host "Deployment complete. Files in deploy:"
        Get-ChildItem deploy
      shell: pwsh

    # 7. 上传构建产物
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenConnect-GUI-CN-Windows-x64
        path: deploy/
        retention-days: 30
