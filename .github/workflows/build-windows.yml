name: Build Windows Installer (Stable LTS)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    # 1. 获取源码
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # 2. 安装 Qt (使用稳定的 6.5.3 LTS 版本)
    - name: Setup Qt (via aqtinstall)
      run: |
        python -m pip install --upgrade pip
        pip install aqtinstall
        
        # 【关键修改】切换为阿里云镜像源 (Aliyun)，避开清华源的损坏文件
        $MIRROR = "https://mirrors.aliyun.com/qt"
        
        Write-Host "Installing Qt 6.5.3 (MSVC 2019 64-bit) from Aliyun..."
        
        # 添加 --noarchives 参数有时能绕过某些校验问题，但这里主要靠换源
        # 如果依然报错，我们可以尝试不安装 qttools (OpenConnect GUI 运行时通常不需要它)
        # 但首先尝试完整安装
        python -m aqt install-qt windows desktop 6.5.3 win64_msvc2019_64 --base $MIRROR
        
        $QtDir = "C:\Qt\6.5.3\msvc2019_64"
        echo "$QtDir\bin" >> $env:GITHUB_PATH
        echo "CMAKE_PREFIX_PATH=$QtDir" >> $env:GITHUB_ENV
        
        if (!(Test-Path "$QtDir\bin\qmake.exe")) {
            Write-Error "Qt installation failed!"
            exit 1
        }
        Write-Host "Qt installed successfully from Aliyun."
      shell: pwsh

    # 3. 配置 MSVC 编译器 (使用 v142 工具集匹配 Qt 6.5.3)
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        toolset: v142

    # 4. 安装依赖 (OpenConnect, Stoken) 并配置 CMake
    - name: Install Dependencies & Configure CMake
      run: |
        # --- 安装 vcpkg 和依赖 ---
        Write-Host "Cloning vcpkg..."
        git clone https://github.com/microsoft/vcpkg.git
        cd vcpkg
        .\bootstrap-vcpkg.bat -disableMetrics
        
        Write-Host "Installing openconnect and stoken..."
        .\vcpkg.exe install openconnect:x64-windows stoken:x64-windows zlib:x64-windows openssl:x64-windows
        
        # --- 配置 CMake ---
        cd ..
        Write-Host "Configuring CMake with VS2019 generator..."
        
        # 使用 Visual Studio 16 2019 生成器，确保与 Qt 版本匹配
        cmake -S . -B build `
          -G "Visual Studio 16 2019" `
          -A x64 `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_TOOLCHAIN_FILE="vcpkg/scripts/buildsystems/vcpkg.cmake" `
          -DCMAKE_PREFIX_PATH="C:\Qt\6.5.3\msvc2019_64"
          
      shell: pwsh

    # 5. 编译项目
    - name: Build Project
      run: |
        cmake --build build --config Release --parallel
      shell: pwsh

    # 6. 部署运行环境 (复制 DLLs)
    - name: Deploy Runtime
      run: |
        # 创建发布目录
        New-Item -ItemType Directory -Force -Path deploy
        
        # 复制主程序
        Copy-Item "build\Release\openconnect-gui.exe" "deploy\"
        
        # 部署 Qt 基础库 (自动复制 qtcore, qtgui, qtwidgets 等)
        Write-Host "Deploying Qt libraries..."
        windeployqt "deploy\openconnect-gui.exe" --release --no-compiler-runtime --no-system-d3d-compiler --no-opengl-sw
        
        # 复制 vcpkg 安装的第三方库 (openconnect.dll, stoken.dll 等)
        Write-Host "Copying vcpkg dependencies..."
        Copy-Item "vcpkg\installed\x64-windows\bin\*.dll" "deploy\" -Force
        
        # 清理不必要的文件 (可选，减小体积)
        # Remove-Item "deploy\*.pdb" -ErrorAction SilentlyContinue
        
        Write-Host "Deployment complete. Files in deploy:"
        Get-ChildItem deploy
      shell: pwsh

    # 7. 上传构建产物
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenConnect-GUI-CN-Windows-x64
        path: deploy/
        retention-days: 30
