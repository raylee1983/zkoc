name: Build Windows Installer (Stable LTS)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    # 1. 获取源码
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # 2. 安装 Qt (使用稳定的 6.5.3 LTS 版本)
    - name: Setup Qt (via aqtinstall)
      run: |
        python -m pip install --upgrade pip
        pip install aqtinstall
        
        $MIRROR = "https://mirrors.aliyun.com/qt"
        Write-Host "Installing Qt 6.5.3 (MSVC 2019 64-bit)..."
        
        # 安装到当前工作目录 (GitHub Actions 默认行为)
        python -m aqt install-qt windows desktop 6.5.3 win64_msvc2019_64 --base $MIRROR
        
        # 【关键修复】使用相对路径或环境变量构建正确路径
        # GitHub Actions 的工作目录通常在 D:\a\RepoName\RepoName\
        # aqt 会在这里创建一个以版本号命名的文件夹
        $BaseDir = Get-Location
        $QtDir = Join-Path $BaseDir "6.5.3\msvc2019_64"
        
        Write-Host "Qt installed at: $QtDir"
        
        # 验证路径是否存在
        if (!(Test-Path "$QtDir\bin\qmake.exe")) {
            Write-Error "Qt installation failed! qmake not found at $QtDir\bin\qmake.exe"
            # 调试信息：列出当前目录看看
            Get-ChildItem $BaseDir
            exit 1
        }
        
        # 设置环境变量 (使用完整绝对路径)
        echo "$QtDir\bin" >> $env:GITHUB_PATH
        echo "CMAKE_PREFIX_PATH=$QtDir" >> $env:GITHUB_ENV
        
        Write-Host "Qt environment configured successfully."
      shell: pwsh

    # 3. 配置 MSVC 编译器 (使用 v142 工具集匹配 Qt 6.5.3)
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        toolset: v142

    # 4. 安装依赖 (OpenConnect, Stoken) 并配置 CMake
    - name: Install Dependencies & Configure CMake
      run: |
        # ... (前面的 vcpkg 代码保持不变) ...
        
        # 【关键修复】使用环境变量 CMAKE_PREFIX_PATH (它在 Setup Qt 步骤中已经设置好了)
        # 或者重新计算路径
        $BaseDir = Get-Location
        $QtDir = Join-Path $BaseDir "6.5.3\msvc2019_64"
        
        Write-Host "Configuring CMake with Qt at: $QtDir"
        
        cmake -S . -B build `
          -G "Visual Studio 16 2019" `
          -A x64 `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_TOOLCHAIN_FILE="vcpkg/scripts/buildsystems/vcpkg.cmake" `
          -DCMAKE_PREFIX_PATH="$QtDir"  # 使用动态计算的正确路径
          
      shell: pwsh

    # 5. 编译项目
    - name: Build Project
      run: |
        cmake --build build --config Release --parallel
      shell: pwsh

    # 6. 部署运行环境 (复制 DLLs)
    - name: Deploy Runtime
      run: |
        # 创建发布目录
        New-Item -ItemType Directory -Force -Path deploy
        
        # 复制主程序
        Copy-Item "build\Release\openconnect-gui.exe" "deploy\"
        
        # 部署 Qt 基础库 (自动复制 qtcore, qtgui, qtwidgets 等)
        Write-Host "Deploying Qt libraries..."
        windeployqt "deploy\openconnect-gui.exe" --release --no-compiler-runtime --no-system-d3d-compiler --no-opengl-sw
        
        # 复制 vcpkg 安装的第三方库 (openconnect.dll, stoken.dll 等)
        Write-Host "Copying vcpkg dependencies..."
        Copy-Item "vcpkg\installed\x64-windows\bin\*.dll" "deploy\" -Force
        
        # 清理不必要的文件 (可选，减小体积)
        # Remove-Item "deploy\*.pdb" -ErrorAction SilentlyContinue
        
        Write-Host "Deployment complete. Files in deploy:"
        Get-ChildItem deploy
      shell: pwsh

    # 7. 上传构建产物
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenConnect-GUI-CN-Windows-x64
        path: deploy/
        retention-days: 30
